# Render Deployment Configuration for STARK Application

services:
  # STARK API Server
  - type: web
    name: stark-api
    runtime: node
    plan: free
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 3003
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CLIENT_URL
        value: https://stark-h310.onrender.com
      - key: FIREBASE_SERVICE_ACCOUNT_KEY_PATH
        sync: false

  # STARK Client (React)
  - type: web
    name: stark-client
    runtime: node
    plan: free
    env: node
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://stark-api-04gm.onrender.com/api/v1
      - key: VITE_SOCKET_URL
        value: https://stark-api-04gm.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_TAWK_PROPERTY_ID
        value: 6a02f560d752791c35103528
      - key: VITE_TAWK_WIDGET_ID
        value: 1jodot2es
      - key: PORT
        value: 4173
